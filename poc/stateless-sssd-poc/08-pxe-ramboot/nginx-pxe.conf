# /etc/nginx/sites-available/pxe — HTTP serving for PXE RAM-boot artifacts
server {
    listen 80 default_server;
    server_name @@DEPLOY_FQDN@@ _;

    root /srv/pxe;
    autoindex on;                    # handy for POC debugging; disable for prod

    # Big sequential reads of the squashfs — tune for boot storms
    sendfile on;
    tcp_nopush on;
    output_buffers 2 1m;

    location / {
        add_header Accept-Ranges bytes;   # iPXE + dracut can resume/range
    }

    access_log /var/log/nginx/pxe-access.log;
}

