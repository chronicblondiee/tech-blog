# /etc/dnsmasq.d/pxe.conf — proxyDHCP + TFTP for PXE RAM-boot fleet
# Coexists with the existing corporate DHCP server: we NEVER hand out IPs,
# only supplement PXE boot options (proxy mode).

# --- proxyDHCP on the bare-metal subnet --------------------------------------
dhcp-range=@@PXE_SUBNET@@,proxy
# If the POC subnet has NO dhcp server at all, comment the line above and use
# an authoritative range instead, e.g.:
# dhcp-range=10.10.20.100,10.10.20.199,255.255.255.0,12h
# dhcp-option=option:dns-server,<AD DC IP>       # nodes MUST resolve AD + infisical

# --- architecture detection (RFC 4578 option 93) ------------------------------
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9
# iPXE sets user-class once it's running, so we can break the chainload loop:
dhcp-userclass=set:ipxe,iPXE

# --- boot file selection -------------------------------------------------------
# Stage 1: firmware PXE ROM -> tiny iPXE binary over TFTP
pxe-service=tag:bios,x86PC,"PXE RAM-boot (BIOS)",undionly.kpxe
dhcp-boot=tag:bios,tag:!ipxe,undionly.kpxe
dhcp-boot=tag:efi64,tag:!ipxe,ipxe.efi
# Stage 2: iPXE -> full boot script over HTTP (fast, scriptable)
dhcp-boot=tag:ipxe,http://@@DEPLOY_FQDN@@/boot.ipxe

# --- TFTP ---------------------------------------------------------------------
enable-tftp
tftp-root=/srv/tftp

# --- hygiene --------------------------------------------------------------------
log-dhcp
# bind only the PXE-facing interface if this box is multi-homed:
# interface=eno2
# bind-interfaces
