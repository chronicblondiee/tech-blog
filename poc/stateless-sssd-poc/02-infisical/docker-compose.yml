# Infisical self-hosted (POC) — docker compose up -d
# UI/API on http://<host>:8080. Put TLS termination (nginx/caddy) in front for prod.
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: infisical
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save "" --appendonly no

  db-migration:
    image: infisical/infisical:latest-postgres
    depends_on:
      db:
        condition: service_healthy
    command: npm run migration:latest
    env_file: .env
    environment:
      DB_CONNECTION_URI: postgres://infisical:${POSTGRES_PASSWORD}@db:5432/infisical

  backend:
    image: infisical/infisical:latest-postgres
    restart: always
    depends_on:
      db:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DB_CONNECTION_URI: postgres://infisical:${POSTGRES_PASSWORD}@db:5432/infisical
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "8080:8080"

volumes:
  pg_data:
